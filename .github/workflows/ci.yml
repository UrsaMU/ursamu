name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Type check
        run: deno check --unstable-kv mod.ts

      - name: Lint
        run: deno lint

      - name: Unit tests
        run: deno test tests/ --allow-all --unstable-kv --no-check

      - name: Security tests
        run: deno test tests/security_*.test.ts --allow-all --unstable-kv --no-check
