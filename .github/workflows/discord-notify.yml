name: Discord Notifications

on:
  push:
    branches: [main]
  release:
    types: [published]
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed, merged]

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      COMMIT_MSG: ${{ github.event.head_commit.message }}
      COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
      COMMIT_URL: ${{ github.event.head_commit.url }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      RELEASE_BODY: ${{ github.event.release.body }}
      RELEASE_URL: ${{ github.event.release.html_url }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_URL: ${{ github.event.issue.html_url }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_URL: ${{ github.event.pull_request.html_url }}
    steps:
      - name: Push to main
        if: github.event_name == 'push'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🔨 New commit on main"
          description: |
            **${{ env.COMMIT_MSG }}**
            by ${{ env.COMMIT_AUTHOR }}
          url: ${{ env.COMMIT_URL }}
          color: 0x5865F2
          nodetail: true

      - name: Release published
        if: github.event_name == 'release'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🚀 UrsaMU ${{ env.RELEASE_TAG }} released"
          description: ${{ env.RELEASE_BODY }}
          url: ${{ env.RELEASE_URL }}
          color: 0x57F287
          nodetail: true

      - name: Issue opened
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🐛 Issue opened: ${{ env.ISSUE_TITLE }}"
          description: ${{ env.ISSUE_BODY }}
          url: ${{ env.ISSUE_URL }}
          color: 0xED4245
          nodetail: true

      - name: Issue closed
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "✅ Issue closed: ${{ env.ISSUE_TITLE }}"
          url: ${{ env.ISSUE_URL }}
          color: 0x57F287
          nodetail: true

      - name: PR opened
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "📬 PR opened: ${{ env.PR_TITLE }}"
          description: ${{ env.PR_BODY }}
          url: ${{ env.PR_URL }}
          color: 0xFEE75C
          nodetail: true

      - name: PR merged
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🔀 PR merged: ${{ env.PR_TITLE }}"
          url: ${{ env.PR_URL }}
          color: 0x57F287
          nodetail: true
