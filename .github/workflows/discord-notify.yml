name: Discord Notifications

on:
  push:
    branches: [main]
  release:
    types: [published]
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed, merged]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Safely extract event fields
        run: |
          node -e '
            const fs = require("fs");
            const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
            const writeEnv = (key, val) => {
              fs.appendFileSync(process.env.GITHUB_ENV, `${key}<<EOF\n${val}\nEOF\n`);
            };
            if (event.issue) {
              writeEnv("ISSUE_TITLE", event.issue.title);
              writeEnv("ISSUE_BODY", event.issue.body || "");
            }
            if (event.pull_request) {
              writeEnv("PR_TITLE", event.pull_request.title);
              writeEnv("PR_BODY", event.pull_request.body || "");
            }
          '

      - name: Push to main
        if: github.event_name == 'push'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🔨 New commit on main"
          description: |
            **${{ github.event.head_commit.message }}**
            by ${{ github.event.head_commit.author.name }}
          url: ${{ github.event.head_commit.url }}
          color: 0x5865F2
          nodetail: true

      - name: Release published
        if: github.event_name == 'release'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🚀 UrsaMU ${{ github.event.release.tag_name }} released"
          description: ${{ github.event.release.body }}
          url: ${{ github.event.release.html_url }}
          color: 0x57F287
          nodetail: true

      - name: Issue opened
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🐛 Issue opened: ${{ env.ISSUE_TITLE }}"
          description: ${{ env.ISSUE_BODY }}
          url: ${{ github.event.issue.html_url }}
          color: 0xED4245
          nodetail: true

      - name: Issue closed
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "✅ Issue closed: ${{ env.ISSUE_TITLE }}"
          url: ${{ github.event.issue.html_url }}
          color: 0x57F287
          nodetail: true

      - name: PR opened
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "📬 PR opened: ${{ env.PR_TITLE }}"
          description: ${{ env.PR_BODY }}
          url: ${{ github.event.pull_request.html_url }}
          color: 0xFEE75C
          nodetail: true

      - name: PR merged
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🔀 PR merged: ${{ env.PR_TITLE }}"
          url: ${{ github.event.pull_request.html_url }}
          color: 0x57F287
          nodetail: true
