name: Security Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-tests:
    name: Exploit Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run security exploit tests
        run: deno test tests/security_*.test.ts --allow-all --unstable-kv --no-check
