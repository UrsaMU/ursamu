name: Security Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-tests:
    name: Exploit Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Run security exploit tests
        run: deno test tests/security_*.test.ts --allow-all --unstable-kv --no-check
