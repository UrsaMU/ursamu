name: Packages CI

on:
  push:
    paths: ["packages/**", "tools/**"]
    branches: [main, master, develop]
  pull_request:
    paths: ["packages/**", "tools/**"]
    branches: [main, master, develop]

jobs:
  boundaries:
    name: Boundary check (core must not import mush)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with: { deno-version: v2.x }
      - run: deno run -A tools/check-boundaries.ts

  core:
    name: "@ursamu/core"
    runs-on: ubuntu-latest
    needs: boundaries
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with: { deno-version: v2.x }
      - name: Lint
        run: deno lint
      - name: Test
        run: deno test tests/ --allow-all --unstable-kv --no-check
        continue-on-error: true  # tests dir is empty until migration

  mush:
    name: "@ursamu/mush"
    runs-on: ubuntu-latest
    needs: boundaries
    defaults:
      run:
        working-directory: packages/mush
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with: { deno-version: v2.x }
      - name: Lint
        run: deno lint
      - name: Test
        run: deno test tests/ --allow-all --unstable-kv --no-check
        continue-on-error: true  # tests dir is empty until migration

  publish-core:
    name: Publish @ursamu/core to JSR
    runs-on: ubuntu-latest
    needs: [core, mush]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write  # required for JSR OIDC publishing
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with: { deno-version: v2.x }
      - name: Publish
        run: deno publish

  publish-mush:
    name: Publish @ursamu/mush to JSR
    runs-on: ubuntu-latest
    needs: [core, mush]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/mush
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with: { deno-version: v2.x }
      - name: Publish
        run: deno publish

  publish-channels:
    name: Publish @ursamu/channels to JSR
    runs-on: ubuntu-latest
    needs: [core, mush]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/channels
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with: { deno-version: v2.x }
      - name: Publish
        run: deno publish

  publish-builder:
    name: Publish @ursamu/builder to JSR
    runs-on: ubuntu-latest
    needs: [core, mush]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/builder
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with: { deno-version: v2.x }
      - name: Publish
        run: deno publish
